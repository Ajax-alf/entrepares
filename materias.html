<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materias</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */

header{
    background:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.logo{
    font-size:35px;
    font-weight:bold;
    color:#0d3b66;
}

nav a{
    text-decoration:none;
    margin:0 15px;
    color:black;
    font-weight:bold;
}

/* CONTENIDO */

.contenedor{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

h1{
    margin-bottom:40px;
    color:#111827;
    font-size:50px;
}

.materias{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

.materia{
    background:white;
    width:300px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0px 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.materia:hover{
    transform:translateY(-10px);
}

.materia h2{
    margin-bottom:20px;
    color:#0d3b66;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* FOOTER */

footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}

</style>
</head>

<body>

<header>
    <div class="logo">+EntrePares</div>

    <nav>
        <a href="index.html">Inicio</a>
    </nav>
</header>

<div class="contenedor">

    <h1>Selecciona una materia</h1>

    <div class="materias">

        <div class="materia">
            <h2>Matemática</h2>

            <a href="matematica.html">
                <button>Ingresar</button>
            </a>
        </div>

        <div class="materia">
            <h2>Inglés</h2>

            <a href="ingles.html">
                <button>Ingresar</button>
            </a>
        </div>

        <div class="materia">
            <h2>Formación Ciudadana</h2>

            <a href="formacion.html">
                <button>Ingresar</button>
            </a>
        </div>

    </div>

</div>

<footer>
    © 2026 EntrePares - Todos los derechos reservados.
</footer>

</body>
</html>
